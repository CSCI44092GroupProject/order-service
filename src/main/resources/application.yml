server:
  port: 8080

spring:
  application:
    name: order-service

  # Local PostgreSQL (Docker) for storing orders
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

# Hosted Product Service (Azure) - used to fetch product data only
product:
  service:
    base-url: https://productservice001-cma3gfg4akc3dtgj.centralus-01.azurewebsites.net

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs